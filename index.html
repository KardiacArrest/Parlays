<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Fight Pool</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background-color: #1e293b; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { text-align: center; font-size: 24px; margin-bottom: 4px; color: #38bdf8; }
        .subtitle { text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 24px; }
        .fight-card { background-color: #0f172a; padding: 16px; border-radius: 12px; margin-bottom: 20px; }
        .fight-title { text-align: center; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 14px; }
        .btn { flex: 1; background-color: #334155; color: #f8fafc; border: 2px solid transparent; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .fighter-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #475569; background-color: #1e293b; }
        .btn.active .fighter-img { border-color: #38bdf8; }
        .btn span { font-size: 11px; color: #38bdf8; }
        .btn.active { background-color: #0284c7; border-color: #38bdf8; }
        
        /* Volume Bar Styling */
        .pool-bar-container { margin-bottom: 16px; padding: 0 4px; }
        .pool-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 4px; font-weight: 500; }
        .pool-bar { height: 6px; background-color: #475569; border-radius: 3px; display: flex; overflow: hidden; }
        .pool-bar-left { height: 100%; background-color: #38bdf8; width: 50%; transition: width 0.4s ease; }
        .pool-bar-right { height: 100%; background-color: #f43f5e; width: 50%; transition: width 0.4s ease; }

        .form-group { margin-bottom: 16px; }
        .wager-row { display: flex; align-items: center; justify-content: space-between; background: #1e293b; padding: 8px; border-radius: 6px; }
        .wager-row label { font-size: 12px; color: #94a3b8; margin-bottom: 0; }
        .wager-input { width: 100px; background-color: #0f172a; border: 2px solid #334155; color: #f8fafc; padding: 6px 10px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: right; }
        .wager-input:focus { outline: none; border-color: #38bdf8; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #94a3b8; }
        input[type="text"] { width: 100%; background-color: #0f172a; border: 2px solid #334155; color: #f8fafc; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 600; }
        input[type="text"]:focus { outline: none; border-color: #38bdf8; }
        .submit-btn { width: 100%; background-color: #22c55e; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .submit-btn:hover { background-color: #16a34a; }
        .submit-btn:disabled { background-color: #475569; cursor: not-allowed; }
        .slip-header { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #38bdf8; margin: 20px 0 12px 0; border-bottom: 1px solid #334155; padding-bottom: 6px; }
        .payout-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .payout-row span:last-child { font-weight: 700; color: #4ade80; }
    </style>
</head>
<body>

<div class="container" id="main-pool">
    <h1>Fight Night Pool</h1>
    <div class="subtitle">Per-Fight Parimutuel Splits</div>

    <!-- Fight 1 -->
    <div class="fight-card">
        <div class="fight-title">Fight 1</div>
        <div class="btn-group">
            <button class="btn" id="btn-TonyLiLi" onclick="selectFighter(1, 'TonyLiLi', this)">
                <img src="https://media.discordapp.net/attachments/754171492543234049/1525222750732423370/image.png?ex=6a5299e1&is=6a514861&hm=ae8745cbb0e48c25bb1797305c937d50aa4cdfbe1260a65b2adafa69ff5a9aef&=&format=webp&quality=lossless&width=141&height=141" class="fighter-img" alt="Tony LiLi">
                Tony LiLi 
                <span id="odds-TonyLiLi">Odds: 2.00x</span>
            </button>
            <button class="btn" id="btn-KevinBrown" onclick="selectFighter(1, 'KevinBrown', this)">
                <img src="https://media.discordapp.net/attachments/754171492543234049/1525223554121994432/image.png?ex=6a529aa0&is=6a514920&hm=fa1c7442fd1107e4b40ec014ad25c89a76c139affeec07ca1461c72060941f1d&=&format=webp&quality=lossless&width=141&height=141" class="fighter-img" alt="Kevin Brown">
                Kevin Brown 
                <span id="odds-KevinBrown">Odds: 2.00x</span>
            </button>
        </div>
        
        <!-- Live Money Distribution Bar -->
        <div class="pool-bar-container">
            <div class="pool-bar-labels">
                <span id="pct-TonyLiLi">50% of pool</span>
                <span id="pct-KevinBrown">50% of pool</span>
            </div>
            <div class="pool-bar">
                <div id="bar-TonyLiLi" class="pool-bar-left"></div>
                <div id="bar-KevinBrown" class="pool-bar-right"></div>
            </div>
        </div>

        <div class="wager-row">
            <label for="wager1">Fight 1 Wager ($)</label>
            <input type="number" id="wager1" class="wager-input" value="10" min="1" oninput="calculateEstimatedPayouts()">
        </div>
    </div>

    <!-- Fight 2 -->
    <div class="fight-card">
        <div class="fight-title">Fight 2</div>
        <div class="btn-group">
            <button class="btn" id="btn-JianHao" onclick="selectFighter(2, 'JianHao', this)">
                <img src="https://placehold.co/150" class="fighter-img" alt="Jian Hao">
                Jian Hao 
                <span id="odds-JianHao">Odds: 2.00x</span>
            </button>
            <button class="btn" id="btn-Zhu" onclick="selectFighter(2, 'Zhu', this)">
                <img src="https://placehold.co/150" class="fighter-img" alt="Zhu">
                Zhu 
                <span id="odds-Zhu">Odds: 2.00x</span>
            </button>
        </div>

        <!-- Live Money Distribution Bar -->
        <div class="pool-bar-container">
            <div class="pool-bar-labels">
                <span id="pct-JianHao">50% of pool</span>
                <span id="pct-Zhu">50% of pool</span>
            </div>
            <div class="pool-bar">
                <div id="bar-JianHao" class="pool-bar-left"></div>
                <div id="bar-Zhu" class="pool-bar-right"></div>
            </div>
        </div>

        <div class="wager-row">
            <label for="wager2">Fight 2 Wager ($)</label>
            <input type="number" id="wager2" class="wager-input" value="10" min="1" oninput="calculateEstimatedPayouts()">
        </div>
    </div>

    <!-- User Inputs -->
    <div class="form-group">
        <label for="playerName">Your Name</label>
        <input type="text" id="playerName" placeholder="Enter name to lock in bet">
    </div>

    <button class="submit-btn" id="submitBetBtn" onclick="submitBetTicket()" disabled>Select Both Fights to Bet</button>

    <!-- Dynamic Payout Preview -->
    <div class="slip-header">Estimated Returns (If Won)</div>
    <div class="payout-row">
        <span>Fight 1 Payout:</span>
        <span id="payout-f1">$0.00</span>
    </div>
    <div class="payout-row">
        <span>Fight 2 Payout:</span>
        <span id="payout-f2">$0.00</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://gehbyxxgqvbbxjdbdlrw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_kBZ3vAiZCqgb-0BAj16e1w_UU6GSwjo';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentOdds = {
        TonyLiLi: 2.0, KevinBrown: 2.0,
        JianHao: 2.0, Zhu: 2.0
    };

    let userSelections = {
        1: { name: null },
        2: { name: null }
    };

    fetchPoolData();

    function selectFighter(fightNum, fighterName, element) {
        const buttons = element.parentElement.querySelectorAll('.btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        userSelections[fightNum].name = fighterName;
        
        const submitBtn = document.getElementById('submitBetBtn');
        if (userSelections[1].name && userSelections[2].name) {
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Bet Ticket";
        }
        
        calculateEstimatedPayouts();
    }

    async function fetchPoolData() {
        const { data: bets, error } = await supabaseClient.from('bets').select('*');
        if (error) return console.error(error);

        let pools = {
            F1_Total: 0, F2_Total: 0,
            TonyLiLi: 0, KevinBrown: 0,
            JianHao: 0, Zhu: 0
        };

        bets.forEach(bet => {
            if (bet.fight_number === 1) {
                pools.F1_Total += bet.wager_amount;
                if (pools[bet.fighter_picked] !== undefined) pools[bet.fighter_picked] += bet.wager_amount;
            } else if (bet.fight_number === 2) {
                pools.F2_Total += bet.wager_amount;
                if (pools[bet.fighter_picked] !== undefined) pools[bet.fighter_picked] += bet.wager_amount;
            }
        });

        // Calculate parimutuel odds based on money
        if (pools.TonyLiLi > 0) currentOdds.TonyLiLi = pools.F1_Total / pools.TonyLiLi;
        if (pools.KevinBrown > 0) currentOdds.KevinBrown = pools.F1_Total / pools.KevinBrown;
        if (pools.JianHao > 0) currentOdds.JianHao = pools.F2_Total / pools.JianHao;
        if (pools.Zhu > 0) currentOdds.Zhu = pools.F2_Total / pools.Zhu;

        // Calculate money splits percentages
        const pctTony = pools.F1_Total > 0 ? (pools.TonyLiLi / pools.F1_Total) * 100 : 50;
        const pctKevin = pools.F1_Total > 0 ? (pools.KevinBrown / pools.F1_Total) * 100 : 50;
        const pctJian = pools.F2_Total > 0 ? (pools.JianHao / pools.F2_Total) * 100 : 50;
        const pctZhu = pools.F2_Total > 0 ? (pools.Zhu / pools.F2_Total) * 100 : 50;

        // Update odds labels
        document.getElementById('odds-TonyLiLi').innerText = `Odds: ${currentOdds.TonyLiLi.toFixed(2)}x`;
        document.getElementById('odds-KevinBrown').innerText = `Odds: ${currentOdds.KevinBrown.toFixed(2)}x`;
        document.getElementById('odds-JianHao').innerText = `Odds: ${currentOdds.JianHao.toFixed(2)}x`;
        document.getElementById('odds-Zhu').innerText = `Odds: ${currentOdds.Zhu.toFixed(2)}x`;

        // Update visual distribution bar & labels
        document.getElementById('pct-TonyLiLi').innerText = `${pctTony.toFixed(0)}% of pool`;
        document.getElementById('pct-KevinBrown').innerText = `${pctKevin.toFixed(0)}% of pool`;
        document.getElementById('bar-TonyLiLi').style.width = `${pctTony}%`;
        document.getElementById('bar-KevinBrown').style.width = `${pctKevin}%`;

        document.getElementById('pct-JianHao').innerText = `${pctJian.toFixed(0)}% of pool`;
        document.getElementById('pct-Zhu').innerText = `${pctZhu.toFixed(0)}% of pool`;
        document.getElementById('bar-JianHao').style.width = `${pctJian}%`;
        document.getElementById('bar-Zhu').style.width = `${pctZhu}%`;

        calculateEstimatedPayouts();
    }

    function calculateEstimatedPayouts() {
        const wager1 = parseFloat(document.getElementById('wager1').value) || 0;
        const wager2 = parseFloat(document.getElementById('wager2').value) || 0;

        if (userSelections[1].name) {
            const p1 = wager1 * currentOdds[userSelections[1].name];
            document.getElementById('payout-f1').innerText = `$${p1.toFixed(2)}`;
        } else {
            document.getElementById('payout-f1').innerText = `$0.00`;
        }
        
        if (userSelections[2].name) {
            const p2 = wager2 * currentOdds[userSelections[2].name];
            document.getElementById('payout-f2').innerText = `$${p2.toFixed(2)}`;
        } else {
            document.getElementById('payout-f2').innerText = `$0.00`;
        }
    }

    async function submitBetTicket() {
        const name = document.getElementById('playerName').value.trim();
        const wager1 = parseFloat(document.getElementById('wager1').value) || 0;
        const wager2 = parseFloat(document.getElementById('wager2').value) || 0;

        if (!name) {
            alert("Please enter your name to submit!");
            return;
        }

        const { error: err1 } = await supabaseClient.from('bets').insert([
            { player_name: name, fight_number: 1, fighter_picked: userSelections[1].name, wager_amount: wager1 }
        ]);

        const { error: err2 } = await supabaseClient.from('bets').insert([
            { player_name: name, fight_number: 2, fighter_picked: userSelections[2].name, wager_amount: wager2 }
        ]);

        if (err1 || err2) {
            alert("Error saving your bets.");
        } else {
            alert("Ticket successfully logged!");
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            userSelections = { 1: { name: null }, 2: { name: null } };
            document.getElementById('playerName').value = '';
            document.getElementById('wager1').value = '10';
            document.getElementById('wager2').value = '10';
            document.getElementById('submitBetBtn').disabled = true;
            document.getElementById('submitBetBtn').innerText = "Select Both Fights to Bet";
            fetchPoolData();
        }
    }
</script>

</body>
</html>
